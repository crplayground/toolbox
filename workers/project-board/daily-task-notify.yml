# ============================================================
# daily-task-notify.yml
# GitHubリポジトリで以下のパスに配置してください：
#   .github/workflows/daily-task-notify.yml
#
# 事前に GitHub Secrets へ以下の3つを登録してください：
#   NOTION_TOKEN  … Notion インテグレーションのAPIキー
#   NOTION_DB_ID  … Notion データベースID
#   SLACK_WEBHOOK … Slack Incoming Webhook URL
# ============================================================

name: 毎朝タスク通知（Slack）

on:
  schedule:
    # 毎日 JST 8:00 に実行（UTC 23:00 = JST 翌朝 8:00）
    - cron: '0 23 * * *'
  # GitHub の Actions タブから手動実行も可能
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python 3.11 をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存ライブラリをインストール
        run: pip install requests

      - name: Slack にタスク通知を送信
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_ID: ${{ secrets.NOTION_DB_ID }}
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        run: python notify.py
