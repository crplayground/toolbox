# Cloudflare Worker 設定ファイル（制作依頼ツール REQUEST）
# 既存ツール（revision-share / project-board）と命名の系統を揃える。

name = "creative-request"
main = "src/worker.js"
compatibility_date = "2025-06-01"

# KVストア。フェーズ3以降の用途＝冪等キー(idem:)・既知依頼者リスト(guest:)。
# form:/html: はフェーズ2以前の残置データ（読み出しのみ・TTLで自然消滅）。
[[kv_namespaces]]
binding = "REQUESTS"
id = "bbc21dc5a528436e8afe3623fdd282d6"

# --- 非機密の設定はここに（vars）。機密は Secrets で登録する（SETUP.md 参照） ---
[vars]
# 許可するフォームのオリジン（カンマ区切り可）。GitHub Pages の公開URLを入れる。
# 【フェーズ3 2026-07-24】旧オリジン yuki-m-15.github.io を退役（T4）。現行は crplayground のみ。
# 反映には `npx wrangler deploy` が必要（このファイルを書き換えただけでは反映されない）。
ALLOWED_ORIGIN = "https://crplayground.github.io"
# Notion APIバージョン（通常は変更不要）
NOTION_VERSION = "2022-06-28"
# 【フェーズ1】GISのOAuthクライアントID（公開情報なのでvarsでOK）。
# フォーム側 index.html の GOOGLE_CLIENT_ID と同じ値にすること。
# 空のままだと /submit が「サーバー設定が未完了です」を返す（＝ログイン必須が常に有効）。
GOOGLE_CLIENT_ID = "667021295506-c020jhqh9co7ou12q0r4kkchnqptf990.apps.googleusercontent.com"

# --- 機密（NOTION_TOKEN / NOTION_DB_ID / SLACK_WEBHOOK_URL）は toml に書かない ---
# 必ず `npx wrangler secret put <名前>` で登録する（SETUP.md 手順3）。
#
# 【フェーズ3】SLACK_WEBHOOK_URL はT0（前提タスク）で登録する。
#   未登録の間はSlack投稿がスキップされ、初依頼者の「既知マーク」も付かない
#   （＝登録後の最初の送信からきちんと通知される設計）。
#
# 【フェーズ3で不要になったもの】
#   FORM_URL / SHARE_URL_PROP（vars）… 共有URL廃止に伴い削除済み
#   CREATIVE_EDITOR_EMAILS（Secret）… 再編集機構の撤去で未使用。
#     登録済みなら `npx wrangler secret delete CREATIVE_EDITOR_EMAILS` で消してよい（残っていても無害）
