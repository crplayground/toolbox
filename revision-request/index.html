// ---- ホーム描画 ----
function renderHome() {
  const idx = loadVaultIndex().slice().sort((a, b) => itemCreatedTs(b) - itemCreatedTs(a));
  document.getElementById('home-count-num').textContent = idx.length;
  document.getElementById('home-count-max').textContent = VAULT_MAX;
  const grid = document.getElementById('item-grid');
  grid.classList.toggle('list', homeView === 'list');
  document.getElementById('view-grid').classList.toggle('active', homeView === 'grid');
  document.getElementById('view-list').classList.toggle('active', homeView === 'list');

  const newCard = `
    <div class="item-card new" onclick="createItem()" title="新しいアイテムを作成">
      <div class="plus-circle">＋</div>
      <div class="new-label">アイテム<br>新規作成</div>
    </div>`;

  const cards = idx.map(e => {
    const published = !!e.url;
    const thumb = e.thumbnail
      ? `<img class="item-thumb" src="${e.thumbnail}" alt="">`
      : `<div class="item-thumb empty">🖼️</div>`;
    const badge = published
      ? `<button class="item-url-badge published" onclick="openItemUrl('${e.id}', event, this)">URLを開く</button>`
      : `<span class="item-url-badge draft">URL未発行</span>`;
    const title = e.title
      ? `<span class="item-card-name">${escHtml(e.title)}</span>`
      : `<span class="item-card-name untitled">無題のアイテム</span>`;
    return `
    <div class="item-card${e.id === homeSelectedId ? ' selected' : ''}" data-id="${e.id}"
         onclick="selectItem('${e.id}')" ondblclick="openItem('${e.id}')" title="クリックで選択・ダブルクリックで開く">
      <div class="item-card-head">
        ${title}
        <button class="item-del" onclick="deleteItem('${e.id}', event)" title="削除">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg>
        </button>
      </div>
      ${thumb}
      ${badge}
      <div class="item-card-meta">レビュー数：${e.annCount != null ? e.annCount : 0}<br>作成日：${fmtDate(itemCreatedTs(e))}</div>
    </div>`;
  }).join('');

  grid.innerHTML = newCard + cards;
  renderAside();
}

function renderAside() {
  const aside = document.getElementById('home-aside');
  const e = homeSelectedId ? loadVaultIndex().find(x => x.id === homeSelectedId) : null;
  if (!e) {
    aside.innerHTML = `<div class="aside-title">選択中のアイテム</div><div class="aside-empty">カードをクリックすると<br>ここに詳細が表示されます</div>`;
    return;
  }
  const published = !!e.url;
  const thumb = e.thumbnail ? `<img class="aside-thumb" src="${e.thumbnail}" alt="">` : `<div class="aside-thumb empty">🖼️</div>`;
  const title = e.title ? `<div class="aside-name">${escHtml(e.title)}</div>` : `<div class="aside-name untitled">無題のアイテム</div>`;
  aside.innerHTML = `
    <div class="aside-title">選択中のアイテム</div>
    ${thumb}
    ${title}
    <div class="aside-actions">
      <button class="btn-aside open" onclick="openItem('${e.id}')">アイテムを開く</button>
      <button class="btn-aside copy" onclick="openItemUrl('${e.id}', event, this)" ${published ? '' : 'disabled'}>${published ? 'URLを開く' : 'URL未発行'}</button>
      <button class="btn-aside del" onclick="deleteItem('${e.id}', event)">このアイテムを削除</button>
    </div>
    <div class="aside-meta">レビュー数：${e.annCount != null ? e.annCount : 0}<br>作成日：${fmtDate(itemCreatedTs(e))}<br>状態：${published ? 'URL発行済み' : '下書き（URL未発行）'}</div>`;
}

function copyItemUrl(id, ev, btn) {
  if (ev) ev.stopPropagation();
  const e = loadVaultIndex().find(x => x.id === id);
  if (e && e.url) copyVaultText(e.url, btn);
}

// 発行済みURLを別タブで開き、同時にクリップボードへコピー
function openItemUrl(id, ev, btn) {
  if (ev) ev.stopPropagation();
  const e = loadVaultIndex().find(x => x.id === id);
  if (!e || !e.url) return;
  window.open(e.url, '_blank', 'noopener');           // 別タブで開く
  try { navigator.clipboard.writeText(e.url); } catch (err) {}  // URLもコピー
  if (btn) { const o = btn.textContent; btn.textContent = '✓ 開く＆コピー'; setTimeout(() => { btn.textContent = o; }, 1300); }
}

// 一覧の先頭へスクロール（ホームボタン／ブランドタイトルから呼ぶ）
function scrollHomeTop() {
  const sc = document.querySelector('.home-scroll');
  if (sc) sc.scrollTo({ top: 0, behavior: 'smooth' });
}

// 登録アイテムを全削除（発行済み共有URLもCloudflareから削除）
function clearAllItems() {
  const idx = loadVaultIndex();
  if (!idx.length) { showToast('削除するアイテムがありません', true); return; }
  if (!confirm('登録されている全 ' + idx.length + ' 件のアイテムを削除しますか？\n（発行済みの共有URLもすべて無効になります。この操作は元に戻せません）')) return;
  idx.forEach(e => {
    localStorage.removeItem(VAULT_SRC_PREFIX + e.id);
    fetch(SHARE_ENDPOINT + '/delete', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id: e.id }) }).catch(() => {});
  });
  saveVaultIndex([]);
  currentVaultId = null;
  localStorage.removeItem(CR_CURRENT_KEY);
  localStorage.removeItem('revision-vault-current');
  homeSelectedId = null;
  renderHome();
  showToast('全アイテムを削除しました', false);
}

// ---- 起動時：旧「現在の作業」(STORAGE_KEY)をアイテムへ移行 ----
function migrateLegacyToItems() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const data = JSON.parse(raw);
    if (!data || !data.pages || !data.pages.length) { localStorage.removeItem(STORAGE_KEY); return; }
    let id = null;
    try { id = localStorage.getItem('revision-vault-current'); } catch (e) {}
    if (!id || !loadVaultIndex().some(x => x.id === id)) id = genItemId();
    localStorage.setItem(VAULT_SRC_PREFIX + id, JSON.stringify(data));
    const p0 = data.pages[0] || {};
    const annCount = data.pages.reduce((s, p) => s + (p.annotations ? p.annotations.length : 0), 0);
    upsertItemMeta(id, {
      title: (data.meta && data.meta.project) || '',
      thumbnail: p0.thumbnail || null,
      pageCount: data.pages.length, annCount, updatedAt: Date.now()
    }, true);
    localStorage.removeItem(STORAGE_KEY); // srcへ移行したので旧バッファは撤去
  } catch (e) {}
}

// ===== LOCAL STORAGE AUTO-SAVE =====
const STORAGE_KEY = 'revision-request-v1';
let _saveTimer = null;

function saveToStorage() {
  try {
    const data = {
      version: 1,
      savedAt: Date.now(),
      curIdx,
      meta: {
        project:  document.getElementById('meta-project').value,
      },
      pages: pages.map(p => ({
        id:          p.id,
        label:       p.label,
        imgDataURL:  p.imgDataURL || null,
        thumbnail:   p.thumbnail,
        canvasW:     p.canvasW,
        canvasH:     p.canvasH,
        nextNum:     p.nextNum,
        annotations: p.annotations.map(a => ({
          id: a.id, num: a.num, type: a.type,
          x: a.x, y: a.y, w: a.w, h: a.h,
          points: a.points || null, color: a.color || null,
          text: a.text, images: a.images || []
        }))
      }))
    };
    if (currentVaultId) {
      // アイテムの元データ(src)へ保存し、ホーム索引のメタ（サムネ・件数・タイトル）も更新
      localStorage.setItem(VAULT_SRC_PREFIX + currentVaultId, JSON.stringify(data));
      localStorage.setItem(CR_CURRENT_KEY, currentVaultId);
      const p0 = data.pages[0] || {};
      const annCount = data.pages.reduce((s, p) => s + (p.annotations ? p.annotations.length : 0), 0);
      upsertItemMeta(currentVaultId, {
        title: data.meta.project || '',
        thumbnail: p0.thumbnail || null,
        pageCount: data.pages.length,
        annCount,
        updatedAt: Date.now()
      }, true);
    } else {
      // フォールバック（アイテム未確定時の作業バッファ）
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }
    // 発行済みアイテムを編集したら「URLを開く」→「URL書き出し」へ戻す（更新を促す）
    // ※読込中(_loadingItem)のプログラム的保存は編集とみなさない
    if (currentVaultId && !_loadingItem && !shareDirty) { shareDirty = true; refreshShareBtn(); }
    showSaveStatus('saved');
  } catch (e) {
    if (e.name === 'QuotaExceededError') showSaveStatus('error');
  }
}

function debouncedSave() {
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(saveToStorage, 800);
}

// 復元後に現在のパネル幅に合わせて canvasW/canvasH とアノテーション座標を再スケール
function rescalePageToCurrentWidth(p) {
  if (!p.imgEl || !p.canvasW || !panel.clientWidth) return;
  const maxW = fitDisplayWidth(p.imgEl.naturalWidth, p.imgEl.naturalHeight);
  const scale = Math.min(maxW / p.imgEl.naturalWidth, 1);
  const newW = Math.round(p.imgEl.naturalWidth * scale);
  const newH = Math.round(p.imgEl.naturalHeight * scale);
  if (newW === p.canvasW && newH === p.canvasH) return;
  const ratio = newW / p.canvasW;
  p.annotations.forEach(a => {
    if (a.x != null) a.x = Math.round(a.x * ratio);
    if (a.y != null) a.y = Math.round(a.y * ratio);
    if (a.w != null) a.w = Math.round(a.w * ratio);
    if (a.h != null) a.h = Math.round(a.h * ratio);
    if (a.points) a.points = a.points.map(pt => ({ x: pt.x * ratio, y: pt.y * ratio }));
  });
  p.canvasW = newW;
  p.canvasH = newH;
}

function loadFromStorage() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return false;
    const data = JSON.parse(raw);
    if (!data || !data.pages || !data.pages.length) return false;

    // Restore meta fields
    if (data.meta) {
      document.getElementById('meta-project').value  = data.meta.project  || '';
      document.getElementById('meta-deadline').value = data.meta.deadline || '';
      document.getElementById('meta-pdfname').value  = data.meta.pdfname  || '';
    }

    // Restore pages array (imgEl is rebuilt below from imgDataURL)
    pages = data.pages.map(pd => ({
      id:          pd.id,
      label:       pd.label,
      imgEl:       null,
      imgDataURL:  pd.imgDataURL || null,
      thumbnail:   pd.thumbnail,
      canvasW:     pd.canvasW,
      canvasH:     pd.canvasH,
      nextNum:     pd.nextNum,
      annotations: pd.annotations || [],
      redoStack:   []
    }));
    curIdx = Math.min(data.curIdx || 0, pages.length - 1);

    // Rebuild imgEl for each page that has a stored image
    let pending = pages.filter(p => p.imgDataURL).length;
    if (pending === 0) { activatePage(curIdx); return true; }

    pages.forEach(p => {
      if (!p.imgDataURL) return;
      const img = new Image();
      img.onload = () => {
        p.imgEl = img;
        rescalePageToCurrentWidth(p);
        pending--;
        if (pending === 0) {
          activatePage(curIdx);
          showSaveStatus('restored');
        }
      };
      img.src = p.imgDataURL;
    });
    return true;
  } catch (e) {
    return false;
  }
}

function clearStorage() {
  if (!confirm('現在の作業をクリアして新規作成しますか？\n（書き出し済みのURL一覧は保存庫に残ります）')) return;
  localStorage.removeItem(STORAGE_KEY);
  localStorage.removeItem('revision-vault-current'); // 現在の作業の紐づけも解除（新規扱いに）
  location.reload();
}

// ===== ツールバー：ボタンが収まらない時だけラベルを畳む（.compact）=====
// 固定ブレークポイントではなく実測＋ヒステリシス。境界での畳む/戻すの往復（チラつき）を防ぐため、
// 「畳む条件」と「戻す条件」に16pxのあそびを設ける。フル表示時の必要幅は _tbNeeded にキャッシュ。
let _tbNeeded = 0;          // 直近に実測した「フル表示に必要な幅」(px)
const TB_HYSTERESIS = 16;   // 畳む幅と戻す幅の差（あそび）。これ未満は状態維持
function updateToolbarCompact() {
  const bar = document.querySelector('.topbar');
  if (!bar) return;
  if (!bar.classList.contains('compact')) {
    // 展開中：実コンテンツ幅を記録し、はみ出していれば畳む
    _tbNeeded = bar.scrollWidth;
    if (_tbNeeded > bar.clientWidth + 1) bar.classList.add('compact');
  } else {
    // 畳み中：明確に余裕（16px）ができた時だけ戻す（往復防止）。畳んだまま測るので再はみ出ししない
    if (bar.clientWidth >= _tbNeeded + TB_HYSTERESIS) bar.classList.remove('compact');
  }
}
// rAFでリサイズ連打をまとめ、1フレーム1回だけ判定（ブラウザの再レイアウト回数も削減）
let _tbRAF = null;
function scheduleToolbarCompact() {
  if (_tbRAF) return;
  _tbRAF = requestAnimationFrame(() => { _tbRAF = null; updateToolbarCompact(); });
}
window.addEventListener('resize', scheduleToolbarCompact);
window.addEventListener('load', updateToolbarCompact);

function showSaveStatus(state) {
  const el = document.getElementById('save-status');
  if (!el) return;
  if (state === 'saved') {
    el.textContent = '✓ 自動保存済み';
    el.style.color = '#aaa';
  } else if (state === 'restored') {
    el.textContent = '↩ データを復元しました';
    el.style.color = '#4a90d9';
    setTimeout(() => { el.textContent = '✓ 自動保存済み'; el.style.color = '#aaa'; updateToolbarCompact(); }, 4000);
  } else if (state === 'drafted') {
    el.textContent = '✓ ドラフトに保存しました';
    el.style.color = '#4a90d9';
    setTimeout(() => { el.textContent = '✓ 自動保存済み'; el.style.color = '#aaa'; updateToolbarCompact(); }, 3000);
  } else if (state === 'error') {
    el.textContent = '⚠ 保存失敗（容量不足）';
    el.style.color = '#d04040';
  }
  updateToolbarCompact(); // save-status のテキスト幅変化に追従
}

// ===== 編集状態のリセット（保存庫の「新規作成」で利用）=====
function resetToFresh() {
  pages = [newPage('ページ 1')];
  curIdx = 0;
  document.getElementById('meta-project').value  = '';
  localStorage.removeItem(STORAGE_KEY);
  activatePage(0);
}

// ===== KEYBOARD =====
document.addEventListener('keydown', e => {
  // テキスト入力中はツール切替ショートカットを無効化（誤爆防止）
  const typing = /^(INPUT|TEXTAREA|SELECT)$/.test((e.target.tagName || '')) || e.target.isContentEditable;
  if ((e.metaKey || e.ctrlKey) && e.shiftKey && (e.key === 'z' || e.key === 'Z')) { e.preventDefault(); redoLast(); return; }
  if ((e.metaKey || e.ctrlKey) && e.key === 'z') { e.preventDefault(); undoLast(); return; }
  // 選択中の注釈を削除（テキスト入力中は無効）
  if (!typing && selectedAnnId != null && (e.key === 'Delete' || e.key === 'Backspace')) {
    e.preventDefault(); removeAnnotation(selectedAnnId); return;
  }
  if (e.key === 'Escape' && selectedAnnId != null) { selectAnn(null); return; }
  if (!e.metaKey && !e.ctrlKey && !e.altKey && !typing) {
    if (e.key === 'p') setTool('pin');
    if (e.key === 'b') setTool('box');
    if (e.key === 'd') setTool('pen');
  }
});

// ===== INIT =====
// アイテム名の変更を自動保存
document.getElementById('meta-project').addEventListener('input', debouncedSave);

// カラーパレット初期化
buildColorPalette();

// 旧「現在の作業」をアイテムへ移行 → 起動はホーム画面から
migrateLegacyToItems();
currentVaultId = null;        // ホーム表示中はどのアイテムにも紐づけない（誤上書き防止）
rebuildPageStrip();
rebuildSidebar();
setHomeView(homeView);
showHome();
</script>
